---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: provisioning
  labels:
    app: order-service
spec:  
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: onekonsole/web-service-order:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8010

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: provisioning
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8010
      targetPort: 8010
  type: NodePort